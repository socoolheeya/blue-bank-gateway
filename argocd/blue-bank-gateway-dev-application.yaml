apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: blue-bank-gateway-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: GIT_REPOSITORY_URL
    targetRevision: main
    path: k8s/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: blue-bank
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
