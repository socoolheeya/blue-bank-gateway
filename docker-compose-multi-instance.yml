version: '3.8'

services:
  # Account Service - 5 instances
  account-1:
    image: blue-bank-account-service:latest
    container_name: account-service-1
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
      SPRING_APPLICATION_NAME: account
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
      EUREKA_INSTANCE_INSTANCE_ID: account-1:8081
    networks:
      - gateway-network
    depends_on:
      eureka:
        condition: service_healthy

