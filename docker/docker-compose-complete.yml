version: '3.8'

services:
  # Eureka Discovery Server
  eureka:
    image: blue-bank-eureka-server:latest
    container_name: eureka-server
    build:
      context: ../blue-bank-eureka-server
      dockerfile: Dockerfile
    ports:
      - "8761:8761"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-default}
    networks:
      - bluebank-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8761/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  # API Gateway
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    image: blue-bank-gateway:latest
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:your-secret-key-must-be-at-least-256-bits-long}
      EUREKA_URI: http://eureka:8761/eureka
    depends_on:
      redis:
        condition: service_healthy
      eureka:
        condition: service_healthy
    networks:
      - bluebank-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s

  # Redis for Rate Limiting
  redis:
    image: redis:7.2-alpine
    container_name: gateway-redis
    ports:
      - "6379:6379"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - bluebank-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  # Account Service
  account-service:
    build:
      context: ../blue-bank/app/account
      dockerfile: Dockerfile
    image: blue-bank-account:latest
    container_name: account-service
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      EUREKA_URI: http://eureka:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:h2:mem:accountdb
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.H2Dialect
      SPRING_H2_CONSOLE_ENABLED: true
      SPRING_H2_CONSOLE_SETTINGS_WEB_ALLOW_OTHERS: true
    depends_on:
      eureka:
        condition: service_healthy
    networks:
      - bluebank-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s

  # Deposit Service
  deposit-service:
    build:
      context: ../blue-bank/app/deposit
      dockerfile: Dockerfile
    image: blue-bank-deposit:latest
    container_name: deposit-service
    ports:
      - "8084:8084"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      EUREKA_URI: http://eureka:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:h2:mem:depositdb
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.H2Dialect
      SPRING_H2_CONSOLE_ENABLED: true
      SPRING_H2_CONSOLE_SETTINGS_WEB_ALLOW_OTHERS: true
      FEIGN_ACCOUNT_URL: http://account-service:8081
    depends_on:
      eureka:
        condition: service_healthy
      account-service:
        condition: service_healthy
    networks:
      - bluebank-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8084/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s

  # Loan Service
  loan-service:
    build:
      context: ../blue-bank/app/loan
      dockerfile: Dockerfile
    image: blue-bank-loan:latest
    container_name: loan-service
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      EUREKA_URI: http://eureka:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:h2:mem:loandb
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.H2Dialect
      SPRING_H2_CONSOLE_ENABLED: true
      SPRING_H2_CONSOLE_SETTINGS_WEB_ALLOW_OTHERS: true
      FEIGN_ACCOUNT_URL: http://account-service:8081
    depends_on:
      eureka:
        condition: service_healthy
      account-service:
        condition: service_healthy
    networks:
      - bluebank-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s

  # Card Service
  card-service:
    build:
      context: ../blue-bank/app/card
      dockerfile: Dockerfile
    image: blue-bank-card:latest
    container_name: card-service
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      EUREKA_URI: http://eureka:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:h2:mem:carddb
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.H2Dialect
      SPRING_H2_CONSOLE_ENABLED: true
      SPRING_H2_CONSOLE_SETTINGS_WEB_ALLOW_OTHERS: true
      FEIGN_ACCOUNT_URL: http://account-service:8081
    depends_on:
      eureka:
        condition: service_healthy
      account-service:
        condition: service_healthy
    networks:
      - bluebank-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8083/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s

  # Nginx (Optional - for production)
  nginx:
    image: nginx:1.26-alpine
    container_name: api-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      gateway:
        condition: service_healthy
    networks:
      - bluebank-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  bluebank-network:
    driver: bridge

volumes:
  redis-data:
    driver: local