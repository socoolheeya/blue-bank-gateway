name: Build and Deploy Gateway (Dev)

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "Dockerfile"
      - ".github/workflows/build-gateway-dev.yml"
  workflow_dispatch:

permissions:
  contents: write

env:
  IMAGE_NAME: blue-bank-gateway

jobs:
  build-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to NCR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.NCR_ENDPOINT }}
          username: ${{ secrets.NCLOUD_ACCESS_KEY }}
          password: ${{ secrets.NCLOUD_SECRET_KEY }}

      - name: Build and push image
        env:
          NCR_ENDPOINT: ${{ secrets.NCR_ENDPOINT }}
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -f Dockerfile \
            -t "$NCR_ENDPOINT/${IMAGE_NAME}:dev-${GITHUB_SHA}" \
            -t "$NCR_ENDPOINT/${IMAGE_NAME}:latest" \
            --push \
            .

  update-manifest:
    needs: build-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Update dev image tag
        run: |
          sed -i "s/newTag: .*/newTag: dev-${GITHUB_SHA}/" \
            k8s/overlays/dev/kustomization.yaml

      - name: Commit and push manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/overlays/dev/kustomization.yaml

          if git diff --cached --quiet; then
            exit 0
          fi

          git commit -m "deploy: update gateway dev image"
          git pull --rebase origin main
          git push origin HEAD:main
