# ============================================
# ModSecurity Main Configuration
# Blue Bank Gateway WAF
# ============================================

# ModSecurity 활성화
SecRuleEngine On

# 요청 본문 검사 활성화
SecRequestBodyAccess On
SecRequestBodyLimit 13107200
SecRequestBodyNoFilesLimit 131072
SecRequestBodyLimitAction Reject

# 응답 본문 검사 (성능 영향 있음, 필요시에만 활성화)
SecResponseBodyAccess Off
SecResponseBodyMimeType text/plain text/html text/xml

# 임시 파일 저장 경로
SecTmpDir /tmp/
SecDataDir /tmp/

# 디버그 로그
SecDebugLog /var/log/modsec/debug.log
SecDebugLogLevel 0  # 0=off, 9=verbose

# 감사 로그 (공격 시도 로그)
SecAuditEngine RelevantOnly
SecAuditLogRelevantStatus "^(?:5|4(?!04))"
SecAuditLogParts ABDEFHIJZ
SecAuditLogType Serial
SecAuditLog /var/log/modsec/audit.log

# 업로드 파일 저장 (포렌식용)
SecUploadDir /tmp/
SecUploadKeepFiles Off

# 규칙 예외 마커
SecMarker BEGIN_CUSTOM_RULES

# ============================================
# Blue Bank 커스텀 보안 규칙
# ============================================

# SQL Injection 방어 강화
SecRule REQUEST_URI|ARGS|REQUEST_HEADERS "@rx (?i)(\bunion\b.*\bselect\b|\bselect\b.*\bfrom\b|(\bor\b|\band\b)\s*\d+\s*=\s*\d+)" \
    "id:1001,\
    phase:2,\
    block,\
    log,\
    msg:'SQL Injection Attack Detected',\
    severity:CRITICAL,\
    tag:'attack-sqli',\
    tag:'bluebank-custom'"

# XSS 방어
SecRule REQUEST_URI|ARGS|REQUEST_HEADERS "@rx (?i)(<script|javascript:|onerror=|onload=|<iframe)" \
    "id:1002,\
    phase:2,\
    block,\
    log,\
    msg:'XSS Attack Detected',\
    severity:CRITICAL,\
    tag:'attack-xss',\
    tag:'bluebank-custom'"

# 경로 탐색 공격 차단
SecRule REQUEST_URI "@rx \.\.\/" \
    "id:1003,\
    phase:1,\
    block,\
    log,\
    msg:'Path Traversal Attack',\
    severity:WARNING,\
    tag:'attack-traversal'"

# 악성 User-Agent 차단
SecRule REQUEST_HEADERS:User-Agent "@rx (?i)(sqlmap|nikto|nmap|masscan|zgrab|metasploit|burpsuite|acunetix)" \
    "id:1004,\
    phase:1,\
    deny,\
    status:403,\
    log,\
    msg:'Malicious Security Scanner Detected',\
    severity:WARNING,\
    tag:'attack-scanner'"

# API Rate Limiting (IP당 100 req/min)
# SecAction "phase:1,id:1005,initcol:ip=%{REMOTE_ADDR},setvar:ip.req_count=+1,expirevar:ip.req_count=60"
# SecRule IP:REQ_COUNT "@gt 100" "phase:1,id:1006,deny,status:429,msg:'Rate Limit Exceeded'"

# JWT 토큰 검증 (Authorization 헤더 필수)
SecRule REQUEST_URI "^/api/" \
    "id:1007,\
    phase:1,\
    chain,\
    log,\
    msg:'Missing Authorization Header on API Request'"
    SecRule &REQUEST_HEADERS:Authorization "@eq 0" \
        "t:none,deny,status:401"

# 금융 데이터 노출 방지 (응답에서 카드번호 패턴 탐지)
SecRule RESPONSE_BODY "@rx \b\d{4}[\s\-]?\d{4}[\s\-]?\d{4}[\s\-]?\d{4}\b" \
    "id:1008,\
    phase:4,\
    block,\
    log,\
    msg:'Credit Card Number in Response',\
    severity:CRITICAL,\
    tag:'data-leak'"

# 주민등록번호 패턴 탐지 (한국)
SecRule RESPONSE_BODY "@rx \b\d{6}[\s\-]?\d{7}\b" \
    "id:1009,\
    phase:4,\
    block,\
    log,\
    msg:'Korean SSN Pattern in Response',\
    severity:CRITICAL,\
    tag:'data-leak'"

# HTTP Method 제한
SecRule REQUEST_METHOD "!@rx ^(GET|POST|PUT|DELETE|PATCH|OPTIONS|HEAD)$" \
    "id:1010,\
    phase:1,\
    deny,\
    status:405,\
    log,\
    msg:'Invalid HTTP Method'"

# 파일 업로드 확장자 제한
SecRule FILES "@rx \.(php|jsp|asp|aspx|exe|sh|bat|cmd)$" \
    "id:1011,\
    phase:2,\
    deny,\
    status:403,\
    log,\
    msg:'Dangerous File Upload Attempt',\
    severity:CRITICAL"

# IP 화이트리스트 (관리자 API)
# SecRule REQUEST_URI "^/admin" \
#     "id:1012,\
#     phase:1,\
#     chain,\
#     deny,\
#     status:403,\
#     msg:'Admin Access Denied'"
#     SecRule REMOTE_ADDR "!@ipMatch 10.0.0.0/8,192.168.0.0/16"

SecMarker END_CUSTOM_RULES

# ============================================
# OWASP CRS (Core Rule Set) 로드
# ============================================
Include /usr/local/owasp-crs/crs-setup.conf
Include /usr/local/owasp-crs/rules/*.conf

# ============================================
# 예외 규칙 (False Positive 방지)
# ============================================

# 특정 API 경로에서 특정 규칙 비활성화
# SecRuleRemoveById 920320  # Missing Host Header
# SecRuleRemoveByMsg "SQL Injection Attack"

# 특정 URL에서 ModSecurity 완전 비활성화 (헬스체크 등)
SecRule REQUEST_URI "@streq /health" \
    "id:2000,\
    phase:1,\
    pass,\
    nolog,\
    ctl:ruleEngine=Off"

SecRule REQUEST_URI "@streq /actuator/health" \
    "id:2001,\
    phase:1,\
    pass,\
    nolog,\
    ctl:ruleEngine=Off"