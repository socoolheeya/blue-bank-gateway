# Additional security configurations

# Block common attack patterns
map $request_uri $blocked {
    default 0;
    ~*(/\.env|/\.git|/\.svn|/\.htaccess) 1;
    ~*(eval\(|base64_decode|gzinflate) 1;
    ~*(union.*select|insert.*into|drop.*table) 1;
}

