# Additional security configurations

# Block common attack patterns
map $request_uri $blocked {
    default 0;
    ~*(/\.env|/\.git|/\.svn|/\.htaccess) 1;
    ~*(eval\(|base64_decode|gzinflate) 1;
    ~*(union.*select|insert.*into|drop.*table) 1;
}

# User agent filtering (optional - uncomment to enable)
map $http_user_agent $blocked_agent {
    default 0;
    # 스캐닝 도구
    ~*(sqlmap|nikto|nmap|masscan|zgrab) 1;
    # 크롤러 봇 (선택적)
    ~*(scrapy|selenium|phantomjs|headless) 1;
    # 취약점 스캐너
    ~*(metasploit|burpsuite|zap|acunetix) 1;
    # 빈 User-Agent
    "" 1;
}