# Deposit Service - Eureka Configuration
# 이 설정을 /blue-bank/app/deposit/src/main/resources/application.yml 에 추가하세요

spring:
  application:
    name: deposit  # Eureka에 등록될 서비스 이름

server:
  port: 8084

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
    registry-fetch-interval-seconds: 5
    enabled: true
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 5
    lease-expiration-duration-in-seconds: 10
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
    metadata-map:
      zone: primary
      version: 1.0.0
      service-type: deposit-management

# Feign Client 설정 - Account Service 호출용
feign:
  client:
    config:
      account:
        url: lb://ACCOUNT  # Eureka를 통한 서비스 디스커버리
        connectTimeout: 5000
        readTimeout: 10000
        loggerLevel: full
  circuitbreaker:
    enabled: true

# 기존 feign.account.url 설정을 제거하고 위의 설정 사용
# 의존성 추가 필요 (build.gradle.kts):
