# Account Service - Eureka Configuration
# 이 설정을 /blue-bank/app/account/src/main/resources/application.yml 에 추가하세요

spring:
  application:
    name: account  # Eureka에 등록될 서비스 이름

server:
  port: 8081

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
    registry-fetch-interval-seconds: 5
    enabled: true
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 5
    lease-expiration-duration-in-seconds: 10
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
    metadata-map:
      zone: primary
      version: 1.0.0
      service-type: core-banking

# Feign Client 설정 (다른 서비스 호출용)
feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 10000
        loggerLevel: basic
  circuitbreaker:
    enabled: true

