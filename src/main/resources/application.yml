# ============================================
# Blue Bank API Gateway - Common Configuration
# ============================================

spring:
  application:
    name: api-gateway

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}  # 기본값: local

  # Gateway 기본 설정
  cloud:
    gateway:
      httpclient:
        pool:
          max-connections: 500
          acquire-timeout: 45000

      # 모든 라우트에 적용되는 기본 필터
      default-filters:
        - AddRequestHeader=X-Gateway, blue-bank-gateway
        - AddResponseHeader=X-Gateway-Version, v1.0.0
        - AddResponseHeader=X-Response-Time, "#{T(java.lang.System).currentTimeMillis()}"

      # 서비스 라우트 정의
      routes:
        # Account Service - 계좌 관리
        - id: account-service
          uri: lb://ACCOUNT
          predicates:
            - Path=/api/accounts/**
          filters:
            - name: CircuitBreaker
              args:
                name: accountCB
                fallbackUri: forward:/fallback/account

        # Deposit Service - 예금 관리
        - id: deposit-service
          uri: lb://DEPOSIT
          predicates:
            - Path=/api/deposits/**
          filters:
            - name: CircuitBreaker
              args:
                name: depositCB
                fallbackUri: forward:/fallback/deposit

        # Loan Service - 대출 관리
        - id: loan-service
          uri: lb://LOAN
          predicates:
            - Path=/api/loans/**
          filters:
            - name: CircuitBreaker
              args:
                name: loanCB
                fallbackUri: forward:/fallback/loan

        # Card Service - 카드 관리
        - id: card-service
          uri: lb://CARD
          predicates:
            - Path=/api/cards/**
          filters:
            - name: CircuitBreaker
              args:
                name: cardCB
                fallbackUri: forward:/fallback/card

        # Internal Account Service (for inter-service communication)
        - id: internal-account-service
          uri: lb://ACCOUNT
          predicates:
            - Path=/internal/accounts/**
          filters:
            - AddRequestHeader=X-Internal-Request, true
            - RemoveRequestHeader=Cookie
            - RemoveRequestHeader=Set-Cookie

# JWT 기본 설정
jwt:
  secret: ${JWT_SECRET:your-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm}
  expiration: 86400000  # 24시간

# Resilience4j Circuit Breaker 기본 설정
resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 100
        minimumNumberOfCalls: 10
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
        slowCallRateThreshold: 50
        slowCallDurationThreshold: 2s
    instances:
      accountCB:
        baseConfig: default
      depositCB:
        baseConfig: default
      loanCB:
        baseConfig: default
      cardCB:
        baseConfig: default

  timelimiter:
    configs:
      default:
        timeoutDuration: 15s
    instances:
      accountCB:
        baseConfig: default
      depositCB:
        baseConfig: default
      loanCB:
        baseConfig: default
      cardCB:
        baseConfig: default