server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      httpclient:
        connect-timeout: 10000
        response-timeout: 15000
        pool:
          max-connections: 500
          acquire-timeout: 45000

      default-filters:
        - AddRequestHeader=X-Gateway, spring-gateway
        - AddResponseHeader=X-Gateway-Version, v1
#        - name: RequestRateLimiter
#          args:
#            redis-rate-limiter.replenishRate: 1
#            redis-rate-limiter.burstCapacity: 1
#            key-resolver: "#{@ipKeyResolver}"

      routes:
        # Account Service - 계좌 관리
        - id: account-service
          uri: lb://ACCOUNT
          predicates:
            - Path=/api/accounts/**
          filters:
            - name: CircuitBreaker
              args:
                name: accountCB
                fallbackUri: forward:/fallback/account

        # Deposit Service - 예금 관리
        - id: deposit-service
          uri: lb://DEPOSIT
          predicates:
            - Path=/api/deposits/**
          filters:
            - name: CircuitBreaker
              args:
                name: depositCB
                fallbackUri: forward:/fallback/deposit

        # Loan Service - 대출 관리
        - id: loan-service
          uri: lb://LOAN
          predicates:
            - Path=/api/loans/**
          filters:
            - name: CircuitBreaker
              args:
                name: loanCB
                fallbackUri: forward:/fallback/loan

        # Card Service - 카드 관리
        - id: card-service
          uri: lb://CARD
          predicates:
            - Path=/api/cards/**
          filters:
            - name: CircuitBreaker
              args:
                name: cardCB
                fallbackUri: forward:/fallback/card

        # Internal Account Service (for inter-service communication)
        - id: internal-account-service
          uri: lb://ACCOUNT
          predicates:
            - Path=/internal/accounts/**
          filters:
            - AddRequestHeader=X-Internal-Request, true

        # Test route to httpbin
        - id: test-route
          uri: https://httpbin.org
          predicates:
            - Path=/httpbin/**
          filters:
            - StripPrefix=1

jwt:
  secret: ${JWT_SECRET:your-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm}

# Resilience4j Circuit Breaker configuration
resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 100
        minimumNumberOfCalls: 10
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
        slowCallRateThreshold: 50
        slowCallDurationThreshold: 2s
    instances:
      accountCB:
        baseConfig: default
      depositCB:
        baseConfig: default
      loanCB:
        baseConfig: default
      cardCB:
        baseConfig: default
  timelimiter:
    configs:
      default:
        timeoutDuration: 15s
    instances:
      accountCB:
        baseConfig: default
      depositCB:
        baseConfig: default
      loanCB:
        baseConfig: default
      cardCB:
        baseConfig: default

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
    registry-fetch-interval-seconds: 5
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 5
    lease-expiration-duration-in-seconds: 10
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}

management:
  endpoints:
    web:
      exposure:
        include: "*"  # 모든 endpoints 노출 (개발 환경용)
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true

